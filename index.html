        const cleanBarcode = (val) => val ? String(val).replace(/'/g, "").trim() : "";

        const parseThaiCustomDate = (val) => {
            if (val === null || val === undefined || val === '') return null;
            if (val instanceof Date) return isNaN(val.getTime()) ? null : val;

            if (typeof val === 'number' || (!isNaN(Number(val)) && !String(val).includes('/') && !String(val).includes('-'))) {
                const num = Number(val);
                if (num > 20000 && num < 60000) {
                    const utcMs = (num - 25569) * 86400 * 1000;
                    const date = new Date(utcMs);
                    return isNaN(date.getTime()) ? null : date;
                }
            }

            const str = String(val).trim();
            const dmyRegex = /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/;
            const match = str.match(dmyRegex);
            if (match) {
                const day = parseInt(match[1], 10);
                const month = parseInt(match[2], 10) - 1;
                const year = parseInt(match[3], 10);
                const hours = match[4] ? parseInt(match[4], 10) : 0;
                const minutes = match[5] ? parseInt(match[5], 10) : 0;
                const seconds = match[6] ? parseInt(match[6], 10) : 0;
                const date = new Date(year, month, day, hours, minutes, seconds);
                return isNaN(date.getTime()) ? null : date;
            }

            const fallback = new Date(str);
            return isNaN(fallback.getTime()) ? null : fallback;
        };

        const formatDateDisplay = (val) => {
            const dt = parseThaiCustomDate(val);
            if (!dt) return val || "-";
            const day = String(dt.getDate()).padStart(2, '0');
            const month = String(dt.getMonth() + 1).padStart(2, '0');
            const year = dt.getFullYear();
            const hours = String(dt.getHours()).padStart(2, '0');
            const mins = String(dt.getMinutes()).padStart(2, '0');
            const secs = String(dt.getSeconds()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${mins}:${secs}`;
        };

        const getYearMonthKey = (val) => {
            const dt = parseThaiCustomDate(val);
            if (!dt) return "ไม่ระบุเดือน";
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        };

        const INITIAL_MOCK_DATA = [

        function MultiSelectDropdown({ label, options, selectedValues, onChange, placeholder }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState("");
            const dropdownRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const filteredOptions = useMemo(() => {
                if (!search.trim()) return options;
                return options.filter(opt => String(opt).toLowerCase().includes(search.toLowerCase()));
            }, [options, search]);

            const toggleOption = (val) => {
                let currentSelected = selectedValues.length === 0 ? [...options] : [...selectedValues];
                let updated;
                if (currentSelected.includes(val)) {
                    updated = currentSelected.filter(item => item !== val);
                } else {
                    updated = [...currentSelected, val];
                }
                if (updated.length === options.length) {
                    updated = [];
                }
                onChange(updated);
            };

            const handleSelectAll = () => {
                onChange([]);
            };

            const getDisplayText = () => {
                if (selectedValues.length === 0) {
                    return `${placeholder} (ทั้งหมด ${options.length})`;
                }
                if (selectedValues.length === options.length) {
                    return `ทั้งหมด (${options.length})`;
                }
                if (selectedValues.length === 1) {
                    return selectedValues[0];
                }
                return `เลือกแล้ว ${selectedValues.length} รายการ`;
            };

            return (
                <div className="relative" ref={dropdownRef}>
                    <label className="block text-[11px] font-semibold text-slate-400 mb-1">{label}</label>
                    <button
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className={`w-full bg-slate-900 border rounded-lg p-2 text-xs text-left flex items-center justify-between transition focus:outline-none ${
                            selectedValues.length > 0 
                                ? 'border-indigo-500 text-indigo-300 font-semibold bg-indigo-950/40' 
                                : 'border-slate-700 text-slate-200 hover:border-slate-600'
                        }`}
                    >
                        <span className="truncate pr-2">{getDisplayText()}</span>
                        <span className="text-[10px] text-slate-400 shrink-0">{isOpen ? '▲' : '▼'}</span>
                    </button>

                    {isOpen && (
                        <div className="absolute z-50 mt-1 w-64 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl p-2.5 text-xs text-slate-200 left-0 max-h-80 flex flex-col">
                            <div className="mb-2">
                                <input
                                    type="text"
                                    placeholder="🔍 ค้นหาในรายการ..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500"
                                />
                            </div>

                            <div className="flex items-center justify-between pb-2 mb-2 border-b border-slate-700 text-[11px]">
                                <button
                                    type="button"
                                    onClick={handleSelectAll}
                                    className={`font-semibold hover:underline ${selectedValues.length === 0 ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}
                                >
                                    ✓ เลือกทั้งหมด
                                </button>
                                {selectedValues.length > 0 && (
                                    <button
                                        type="button"
                                        onClick={() => onChange([])}
                                        className="text-rose-400 hover:underline font-semibold"
                                    >
                                        ✕ ล้างการเลือก ({selectedValues.length})
                                    </button>
                                )}
                            </div>

                            <div className="overflow-y-auto custom-scrollbar flex-1 space-y-1 pr-1 max-h-48">
                                {filteredOptions.length === 0 ? (
                                    <p className="text-slate-500 text-center py-2 text-[11px]">ไม่พบข้อมูล</p>
                                ) : (
                                    filteredOptions.map((opt) => {
                                        const isChecked = selectedValues.length === 0 || selectedValues.includes(opt);
                                        return (
                                            <label
                                                key={opt}
                                                className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-slate-700/60 cursor-pointer text-xs select-none transition"
                                            >
                                                <input
                                                    type="checkbox"
                                                    checked={isChecked}
                                                    onChange={() => toggleOption(opt)}
                                                    className="w-3.5 h-3.5 accent-indigo-600 rounded cursor-pointer shrink-0"
                                                />
                                                <span className={`truncate ${isChecked ? 'text-white font-medium' : 'text-slate-400'}`}>
                                                    {opt}
                                                </span>
                                            </label>
                                        );
                                    })
                                )}
                            </div>

                            <div className="pt-2 mt-2 border-t border-slate-700/80 flex items-center justify-between text-[10px] text-slate-400">
                                <span>{selectedValues.length === 0 ? `เลือกทั้งหมด (${options.length})` : `เลือก ${selectedValues.length} จาก ${options.length}`}</span>
                                <button
                                    type="button"
                                    onClick={() => setIsOpen(false)}
                                    className="px-2.5 py-1 bg-indigo-600 hover:bg-indigo-500 text-white rounded font-medium transition"
                                >
                                    ตกลง
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [fileList, setFileList] = useState([
                { 
                    id: 'file-default-1', 
                    fileName: 'ข้อมูลตัวอย่าง (Sample Dataset)', 
                    uploadTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }), 
                    recordCount: INITIAL_MOCK_DATA.length, 
                    enabled: true, 
                    data: INITIAL_MOCK_DATA 
                }
            ]);

            const [levelRules] = useState(DEFAULT_LEVEL_RULES);
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            const [activeTab, setActiveTab] = useState("dashboard");
            const [showFileManager, setShowFileManager] = useState(false);
            const [selectedAuditRecord, setSelectedAuditRecord] = useState(null);
            const [selectedAuditMonth, setSelectedAuditMonth] = useState("ALL");

            // Search Term
            const [searchTerm, setSearchTerm] = useState("");
            
            // Multi-Select Filters
            const [selectedDeparts, setSelectedDeparts] = useState([]); 
            const [selectedLevels, setSelectedLevels] = useState([]);   
            const [selectedBranches, setSelectedBranches] = useState([]); 

            // Single Movie Selection
            const [selectedMovie, setSelectedMovie] = useState("ALL");

            // Date Filters
            const [startDate, setStartDate] = useState("");
            const [endDate, setEndDate] = useState("");
            const [tempStartDate, setTempStartDate] = useState("");
            const [tempEndDate, setTempEndDate] = useState("");

            // Analytics Trend Toggle (daily / monthly / yearly)
            const [trendGroup, setTrendGroup] = useState("monthly");

            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(20);
            const [isUploading, setIsUploading] = useState(false);

            const showNotification = (msg, type = 'info') => {
                setToast({ show: true, message: msg, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary', cellDates: true, raw: false });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const rawData = XLSX.utils.sheet_to_json(ws);

                        const formatted = rawData.map(row => ({
                            Datetime: row.Datetime || row.datetime || row.DATETIME || new Date().toISOString(),
                            Depart: row.Depart || row.depart || "ไม่ระบุ",
                            Level: row.Level || row.level || "-",
                            Barcode: cleanBarcode(row.Barcode || row.barcode),
                            StaffName: row.StaffName || row.staffname || row.Name || "N/A",
                            Branch: row.Branch || row.branch || "-",
                            Moviename: row.Moviename || row.moviename || "N/A",
                            No: row.No || row.no || "-",
                            Showtime: row.Showtime || row.showtime || row.SHOWTIME || "-",
                            Seat: Number(row.Seat || row.seat || 1)
                        }));

                        const newFileObj = {
                            id: `file-${Date.now()}`,
                            fileName: file.name,
                            uploadTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                            recordCount: formatted.length,
                            enabled: true,
                            data: formatted
                        };

                        setFileList(prev => [...prev, newFileObj]);
                        setCurrentPage(1);
                        showNotification(`นำเข้าไฟล์ ${file.name} จำนวน ${formatted.length} รายการสำเร็จ!`, 'success');
                    } catch (err) {
                        showNotification('ไม่สามารถอ่านไฟล์ Excel ได้ กรุณาตรวจสอบรูปแบบไฟล์', 'error');
                    } finally {
                        setIsUploading(false);
                        e.target.value = "";
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleFileEnabled = (id) => {
                setFileList(prev => prev.map(f => f.id === id ? { ...f, enabled: !f.enabled } : f));
            };

            const removeFile = (id) => {
                if (fileList.length <= 1) {
                    showNotification('ต้องมีอย่างน้อย 1 ชุดข้อมูลในระบบ', 'warning');
                    return;
                }
                setFileList(prev => prev.filter(f => f.id !== id));
            };

            const toggleBranchSelection = (branchName) => {
                setSelectedBranches(prev => {
                    if (prev.includes(branchName)) {
                        return prev.filter(b => b !== branchName);
                    } else {
                        return [...prev, branchName];
                    }
                });
                setCurrentPage(1);
            };

            const resetAllFilters = () => {
                setSearchTerm("");
                setSelectedDeparts([]);
                setSelectedLevels([]);
                setSelectedBranches([]);
                setSelectedMovie("ALL");
                setTempStartDate("");
                setTempEndDate("");
                setStartDate("");
                setEndDate("");
                setCurrentPage(1);
                showNotification('ล้างตัวกรองทั้งหมดเรียบร้อยแล้ว', 'info');
            };

            const handleResetDateFilters = () => {
                setTempStartDate("");
                setTempEndDate("");
                setStartDate("");
                setEndDate("");
                setCurrentPage(1);
                showNotification('ล้างตัวกรองวันที่เรียบร้อยแล้ว', 'info');
            };

            const handleApplyDateFilter = () => {
                setStartDate(tempStartDate);
                setEndDate(tempEndDate);
                setCurrentPage(1);
                showNotification('นำเข้าตัวกรองวันที่แล้ว', 'success');
            };

            const activeRawData = useMemo(() => {
                return fileList.filter(f => f.enabled).flatMap(f => f.data);
            }, [fileList]);

            const dateFilteredData = useMemo(() => {
                return activeRawData.filter(item => {
                    const dt = parseThaiCustomDate(item.Datetime);
                    if (startDate && dt) {
                        const s = new Date(startDate);
                        s.setHours(0, 0, 0, 0);
                        if (dt < s) return false;
                    }
                    if (endDate && dt) {
                        const e = new Date(endDate);
                        e.setHours(23, 59, 59, 999);
                        if (dt > e) return false;
                    }
                    return true;
                });
            }, [activeRawData, startDate, endDate]);

            // Requirement 1: Movies list reference strictly based on dateFilteredData
            const moviesList = useMemo(() => {
                const set = new Set(dateFilteredData.map(d => d.Moviename).filter(Boolean));
                return Array.from(set).sort();
            }, [dateFilteredData]);

            // Reset selected movie if it's no longer available in the date range
            useEffect(() => {
                if (selectedMovie !== "ALL" && !moviesList.includes(selectedMovie)) {
                    setSelectedMovie("ALL");
                }
            }, [moviesList, selectedMovie]);

            const departmentsList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Depart).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            const branchesList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Branch).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            const levelsList = useMemo(() => {
                const set = new Set(activeRawData.map(d => String(d.Level || "").toUpperCase()).filter(Boolean));
                levelRules.forEach(r => set.add(r.levelCode.toUpperCase()));
                return Array.from(set).sort();
            }, [activeRawData, levelRules]);

            const filteredData = useMemo(() => {
                return activeRawData.filter(item => {
                    // Search term filter
                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        const matchName = String(item.StaffName || "").toLowerCase().includes(term);
                        const matchCode = String(item.Barcode || "").toLowerCase().includes(term);
                        const matchMovie = String(item.Moviename || "").toLowerCase().includes(term);
                        if (!matchName && !matchCode && !matchMovie) return false;
                    }

                    // Requirement 2: Multi-select Department Filter
                    if (selectedDeparts.length > 0 && !selectedDeparts.includes(item.Depart)) {
                        return false;
                    }

                    // Requirement 2: Multi-select Level Filter
                    if (selectedLevels.length > 0 && !selectedLevels.includes(String(item.Level || "").toUpperCase())) {
                        return false;
                    }

                    // Multi-select Branch Filter
                    if (selectedBranches.length > 0 && !selectedBranches.includes(item.Branch)) {
                        return false;
                    }

                    // Movie Filter
                    if (selectedMovie !== "ALL" && item.Moviename !== selectedMovie) {
                        return false;
                    }

                    // Date Filters
                    const dt = parseThaiCustomDate(item.Datetime);
                    if (startDate && dt) {
                        const s = new Date(startDate);
                        s.setHours(0, 0, 0, 0);
                        if (dt < s) return false;
                    }
                    if (endDate && dt) {
                        const e = new Date(endDate);
                        e.setHours(23, 59, 59, 999);
                        if (dt > e) return false;
                    }
                    return true;
                });
            }, [activeRawData, searchTerm, selectedDeparts, selectedLevels, selectedBranches, selectedMovie, startDate, endDate]);

            const auditSummary = useMemo(() => {
                const map = {};
                filteredData.forEach(row => {
                    const bc = cleanBarcode(row.Barcode);
                    if (!bc) return;
                    const monthKey = getYearMonthKey(row.Datetime);
                    const compositeKey = `${bc}_${monthKey}`;

                    if (!map[compositeKey]) {
                        map[compositeKey] = {
                            key: compositeKey,
                            barcode: bc,
                            staffName: row.StaffName || "N/A",
                            depart: row.Depart || "N/A",
                            level: row.Level || "-",
                            branch: row.Branch || "-",
                            monthPeriod: monthKey,
                            totalSeatsUsed: 0,
                            claimCount: 0,
                            history: []
                        };
                    }
                    map[compositeKey].totalSeatsUsed += Number(row.Seat || 1);
                    map[compositeKey].claimCount += 1;
                    map[compositeKey].history.push(row);
                });

                let results = Object.values(map).map(emp => {
                    const rule = levelRules.find(r => r.levelCode.toUpperCase() === String(emp.level).toUpperCase()) || { ticketQty: 0, levelName: "Unknown" };
                    const quota = rule.ticketQty;
                    const remaining = quota - emp.totalSeatsUsed;
                    return {
                        ...emp,
                        quota,
                        remaining: remaining < 0 ? 0 : remaining,
                        isExceeded: emp.totalSeatsUsed > quota,
                        exceededBy: emp.totalSeatsUsed > quota ? emp.totalSeatsUsed - quota : 0
                    };
                });

                if (selectedAuditMonth !== "ALL") {
                    results = results.filter(r => r.monthPeriod === selectedAuditMonth);
                }

                return results.sort((a, b) => b.monthPeriod.localeCompare(a.monthPeriod));
            }, [filteredData, levelRules, selectedAuditMonth]);

                    const bc = cleanBarcode(d.Barcode);
                    if (bc && !totalActiveEmployeesMap.has(bc)) {
                        totalActiveEmployeesMap.set(bc, d);
                    }
                });
                
                const activeUsersSet = new Set(filteredData.map(d => cleanBarcode(d.Barcode)).filter(Boolean));
                
                let eligibleEmployees = Array.from(totalActiveEmployeesMap.values());
                if (selectedDeparts.length > 0) {
                    eligibleEmployees = eligibleEmployees.filter(e => selectedDeparts.includes(e.Depart));
                }
                if (selectedLevels.length > 0) {
                    eligibleEmployees = eligibleEmployees.filter(e => selectedLevels.includes(String(e.Level || "").toUpperCase()));
                }
                if (selectedBranches.length > 0) {
                    eligibleEmployees = eligibleEmployees.filter(e => selectedBranches.includes(e.Branch));
                }

                const totalEligibleCount = eligibleEmployees.length || totalActiveEmployeesMap.size;
                const usedCount = activeUsersSet.size;
                const unusedCount = Math.max(0, totalEligibleCount - usedCount);

                const totalSeatsUsed = filteredData.reduce((acc, curr) => acc + Number(curr.Seat || 1), 0);

                eligibleEmployees.forEach(emp => {
                    const rule = levelRules.find(r => r.levelCode.toUpperCase() === String(emp.Level || "").toUpperCase());
                    totalAllocatedQuota += rule ? rule.ticketQty : 0;
                });

                    totalAllocatedQuota = totalEligibleCount * 6;
                }

                    totalClaims: filteredData.length,
                    totalSeatsUsed,
                    totalEligibleCount,
                    usedCount,
                    unusedCount,

                        key = `${day}/${month}/${dt.getFullYear()}`;
                    } else if (trendGroup === "yearly") {

                    } else { 
                        const month = String(dt.getMonth() + 1).padStart(2, '0');
                        key = `${dt.getFullYear()}-${month}`;

                    if (!map[key]) {

                                        </div>
                                        <p className="text-xs text-slate-400 mt-1">
                                            ช่วงเวลาข้อมูล: <span className="text-emerald-400 font-semibold">{startDate ? startDate : 'เริ่มต้น'} ถึง {endDate ? endDate : 'ปัจจุบัน'}</span> • กรองแล้ว {filteredData.length} รายการ
                                        </p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={() => exportToExcel(filteredData.map((d, i) => ({ No: i+1, Datetime: formatDateDisplay(d.Datetime), Depart: d.Depart, Level: d.Level, Barcode: d.Barcode, StaffName: d.StaffName, Branch: d.Branch, Movie: d.Moviename, Seats: d.Seat })), "Executive_Report", "Executive")}
                                            className="px-3.5 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold rounded-xl shadow transition"
                                        >
                                            📥 Export Excel สรุปผู้บริหาร
                                        </button>
                                        <button 
                                            onClick={() => window.print()}
                                            className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold rounded-xl shadow transition flex items-center gap-2"
                                        >
                                            <span>🖨️ พิมพ์หน้ารายงาน</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-slate-800/90 border border-slate-700 p-4 rounded-xl shadow">
                                        <div className="text-xs text-slate-400 font-semibold mb-1">🎟️ จำนวนครั้งการแลกสิทธิ์</div>
                                        <div className="text-2xl font-bold text-white">{filteredData.length.toLocaleString()} ครั้ง</div>
                                    </div>
                                    <div className="bg-slate-800/90 border border-slate-700 p-4 rounded-xl shadow">
                                        <div className="text-xs text-slate-400 font-semibold mb-1">💺 จำนวนที่นั่งรวมที่ใช้</div>
                                        <div className="text-2xl font-bold text-emerald-400">
                                            {analyticsKPIs.totalSeatsUsed.toLocaleString()} ที่นั่ง
                                        </div>
                                    </div>
                                    <div className="bg-slate-800/90 border border-slate-700 p-4 rounded-xl shadow">
                                        <div className="text-xs text-slate-400 font-semibold mb-1">📈 อัตราการใช้สิทธิ์ (%)</div>
                                        <div className="text-2xl font-bold text-indigo-400">{analyticsKPIs.utilizationRate}%</div>
                                    </div>
                                    <div className="bg-slate-800/90 border border-slate-700 p-4 rounded-xl shadow">
                                        <div className="text-xs text-slate-400 font-semibold mb-1">⚠️ เกินโควตา (รายเดือน)</div>
                                        <div className="text-2xl font-bold text-rose-400">{auditSummary.filter(a => a.isExceeded).length} รายการ</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-800/80 border border-slate-700/80 p-5 rounded-xl space-y-3">
                                        <h4 className="text-sm font-bold text-white flex items-center gap-2">
                                            <span>🏢 แผนกที่ใช้สิทธิ์สูงสุด (Top Departments)</span>
                                        </h4>
                                        <div className="space-y-2">
                                            {chartDepartData.slice(0, 5).map((d, i) => (
                                                <div key={d.name} className="flex items-center justify-between p-2.5 bg-slate-900 rounded-lg text-xs">
                                                    <span className="font-semibold text-slate-200">{i+1}. {d.name}</span>
                                                    <span className="font-bold text-indigo-400">{d.seats} ที่นั่ง</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/80 border border-slate-700/80 p-5 rounded-xl space-y-3">
                                        <h4 className="text-sm font-bold text-white flex items-center gap-2">
                                            <span>🎬 ภาพยนตร์/สวัสดิการยอดนิยมประจำช่วงเวลานี้</span>
                                        </h4>
                                        <div className="space-y-2">
                                            {topMoviesData.map((m, i) => (
                                                <div key={m.name} className="flex items-center justify-between p-2.5 bg-slate-900 rounded-lg text-xs">
                                                    <span className="font-semibold text-slate-200">{i+1}. {m.name}</span>
                                                    <span className="font-bold text-emerald-400">{m.count} ที่นั่ง</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Employee Claim History Modal */}
                    {selectedAuditRecord && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl max-w-2xl w-full p-6 shadow-2xl relative space-y-4 max-h-[85vh] flex flex-col">
                                <button 
                                    onClick={() => setSelectedAuditRecord(null)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white p-1"
                                >
                                    ✕
                                </button>
                                <div className="border-b border-slate-800 pb-3">
                                    <h3 className="text-base font-bold text-white">📜 ประวัติการแลกสิทธิ์: {selectedAuditRecord.staffName} (รอบเดือน {selectedAuditRecord.monthPeriod})</h3>
                                    <p className="text-xs text-slate-400">Barcode: {selectedAuditRecord.barcode} • แผนก: {selectedAuditRecord.depart} • Level: {selectedAuditRecord.level}</p>
                                </div>

                                <div className="overflow-y-auto custom-scrollbar flex-1 space-y-2">
                                    {selectedAuditRecord.history.map((h, i) => (
                                        <div key={i} className="p-3 bg-slate-800/80 rounded-xl border border-slate-700/80 flex items-center justify-between text-xs">
                                            <div>
                                                <p className="font-semibold text-emerald-300">{h.Moviename}</p>
                                                <p className="text-[11px] text-slate-400">วันเวลา: {formatDateDisplay(h.Datetime)} • สาขา: {h.Branch}</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="font-bold text-amber-400">{h.Seat} ที่นั่ง</span>
                                                <p className="text-[11px] text-slate-400">ที่นั่ง: {h.No}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
