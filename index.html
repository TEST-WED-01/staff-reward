<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารและวิเคราะห์สวัสดิการพนักงาน (Employee Welfare Analytics)</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (XLSX Parser) -->

    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = window.Recharts || {};

        // Master Level Rules Data
        const DEFAULT_LEVEL_RULES = [
            { levelCode: 'AF', levelName: 'Department/Director', ticketQty: 10, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'AH', levelName: 'Department/Director', ticketQty: 5, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'BF', levelName: 'Section manager/Assistant Manager', ticketQty: 8, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'BH', levelName: 'Section manager/Assistant Manager', ticketQty: 4, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'CF', levelName: 'Senior/Supervisor', ticketQty: 6, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'CH', levelName: 'Senior/Supervisor', ticketQty: 3, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'DF', levelName: 'Officer', ticketQty: 4, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'DH', levelName: 'Officer', ticketQty: 2, conditionMovie: 4, conditionSeat: 2 },
            { levelCode: 'FF', levelName: 'Cinema Staff Full Time', ticketQty: 10, conditionMovie: 0, conditionSeat: 2 },
            { levelCode: 'FH', levelName: 'Cinema Staff Full Time', ticketQty: 5, conditionMovie: 0, conditionSeat: 2 },
            { levelCode: 'PA', levelName: 'Parttime_A', ticketQty: 1000, conditionMovie: 0, conditionSeat: 999 },
            { levelCode: 'PB', levelName: 'Parttime_B', ticketQty: 700, conditionMovie: 0, conditionSeat: 700 },
            { levelCode: 'PC', levelName: 'Parttime_C', ticketQty: 500, conditionMovie: 0, conditionSeat: 500 },
            { levelCode: 'PD', levelName: 'Parttime_D', ticketQty: 400, conditionMovie: 0, conditionSeat: 400 },
            { levelCode: 'PE', levelName: 'Parttime_E', ticketQty: 300, conditionMovie: 0, conditionSeat: 300 },
            { levelCode: 'PF', levelName: 'Parttime', ticketQty: 100, conditionMovie: 0, conditionSeat: 100 }
        ];

        // Clean single quote `'` from barcodes
        const cleanBarcode = (val) => val ? String(val).replace(/'/g, "").trim() : "";

        // Parse custom Thai date strings or Excel serial numbers
        const parseThaiCustomDate = (val) => {
            if (val === null || val === undefined || val === '') return null;
            if (val instanceof Date) return isNaN(val.getTime()) ? null : val;

            if (typeof val === 'number' || (!isNaN(Number(val)) && !String(val).includes('/') && !String(val).includes('-'))) {
                const num = Number(val);
                if (num > 20000 && num < 60000) {
                    const utcMs = (num - 25569) * 86400 * 1000;
                    const date = new Date(utcMs);
                    return isNaN(date.getTime()) ? null : date;
                }
            }

            const str = String(val).trim();
            const dmyRegex = /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/;
            const match = str.match(dmyRegex);
            if (match) {
                const day = parseInt(match[1], 10);
                const month = parseInt(match[2], 10) - 1;
                const year = parseInt(match[3], 10);
                const hours = match[4] ? parseInt(match[4], 10) : 0;
                const minutes = match[5] ? parseInt(match[5], 10) : 0;
                const seconds = match[6] ? parseInt(match[6], 10) : 0;
                const date = new Date(year, month, day, hours, minutes, seconds);
                return isNaN(date.getTime()) ? null : date;
            }

            const fallback = new Date(str);
            return isNaN(fallback.getTime()) ? null : fallback;
        };

        // Format dates into Thai standard format
        const formatDateDisplay = (val) => {
            const dt = parseThaiCustomDate(val);
            if (!dt) return val || "-";
            const day = String(dt.getDate()).padStart(2, '0');
            const month = String(dt.getMonth() + 1).padStart(2, '0');
            const year = dt.getFullYear();
            const hours = String(dt.getHours()).padStart(2, '0');
            const mins = String(dt.getMinutes()).padStart(2, '0');
            const secs = String(dt.getSeconds()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${mins}:${secs}`;
        };

        const INITIAL_MOCK_DATA = [
            { Datetime: "1/2/2026 10:00:00", Depart: "Operation", Level: "FF", Barcode: "100000506", StaffName: "Kanyapuk Wangklon", Branch: "NKT", Moviename: "Zootopia 2 (T)", No: "C2, C1", Showtime: "1/2/2026 10:30:00", Seat: 2 },
            { Datetime: "2/2/2026 14:15:00", Depart: "Operation", Level: "FF", Barcode: "100000506", StaffName: "Kanyapuk Wangklon", Branch: "NKT", Moviename: "Avatar 3", No: "D5, D6", Showtime: "2/2/2026 15:00:00", Seat: 2 },
            { Datetime: "3/2/2026 18:20:00", Depart: "HR", Level: "DF", Barcode: "200001102", StaffName: "Somchai Jaidee", Branch: "BKK", Moviename: "Wicked", No: "E1, E2", Showtime: "3/2/2026 19:00:00", Seat: 2 },
            { Datetime: "5/2/2026 11:30:00", Depart: "Marketing", Level: "BF", Barcode: "300009941", StaffName: "Somsri Rakthai", Branch: "RAM", Moviename: "Zootopia 2 (T)", No: "A1, A2", Showtime: "5/2/2026 12:00:00", Seat: 2 }
        ];

        const CHART_COLORS = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#14B8A6', '#6366F1'];

        // 🔗 ใส่ Cloudflare Worker Endpoint URL ของคุณตรงนี้ได้เลย
        const DEFAULT_WORKER_URL = "https://staffreward.jaypichayut01.workers.dev";

        function App() {
            const [fileList, setFileList] = useState([
                { 
                    id: 'file-default-1', 
                    fileName: 'ข้อมูลตัวอย่าง (Sample Dataset)', 
                    uploadTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }), 
                    recordCount: INITIAL_MOCK_DATA.length, 
                    enabled: true, 
                    data: INITIAL_MOCK_DATA 
                }
            ]);

            const [levelRules] = useState(DEFAULT_LEVEL_RULES);
            
            // Cloudflare Worker API Gateway State
            const [workerUrl] = useState(DEFAULT_WORKER_URL);
            const [isCfConnected, setIsCfConnected] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            // Toast message system
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            // Navigation & UI States
            const [activeTab, setActiveTab] = useState("dashboard");
            const [showFileManager, setShowFileManager] = useState(false);
            const [selectedAuditBarcode, setSelectedAuditBarcode] = useState(null);

            // Filter States
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedDepart, setSelectedDepart] = useState("ALL");
            const [selectedBranches, setSelectedBranches] = useState([]); 
            const [selectedMovie, setSelectedMovie] = useState("ALL");
            const [selectedLevel, setSelectedLevel] = useState("ALL");

            const [startDate, setStartDate] = useState("");
            const [endDate, setEndDate] = useState("");
            const [tempStartDate, setTempStartDate] = useState("");
            const [tempEndDate, setTempEndDate] = useState("");

            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(20);
            const [isUploading, setIsUploading] = useState(false);

            const showNotification = (msg, type = 'info') => {
                setToast({ show: true, message: msg, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
            };

            useEffect(() => {
                if (workerUrl) {
                    const cleanUrl = workerUrl.replace(/\/$/, '');
                    fetch(`${cleanUrl}/api/health`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.status === 'online') {
                                setIsCfConnected(true);
                                localStorage.setItem('cf_worker_url', cleanUrl);
                            } else {
                                setIsCfConnected(false);
                            }
                        })
                        .catch(() => setIsCfConnected(false));
                } else {
                    setIsCfConnected(false);
                }
            }, [workerUrl]);

            const handleConnectWorker = (e) => {
                e.preventDefault();
                if (!workerUrl) {
                    setCfMessage({ type: 'error', text: 'กรุณากรอก Cloudflare Worker URL' });
                    return;
                }
                const cleanUrl = workerUrl.replace(/\/$/, '');
                fetch(`${cleanUrl}/api/health`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.status === 'online') {
                            setIsCfConnected(true);
                            setWorkerUrl(cleanUrl);
                            localStorage.setItem('cf_worker_url', cleanUrl);
                            setCfMessage({ type: 'success', text: 'เชื่อมต่อ Cloudflare API Gateway สำเร็จ!' });
                            showNotification('เชื่อมต่อ Cloudflare API Gateway สำเร็จ!', 'success');
                            setTimeout(() => { setShowCfModal(false); setCfMessage({ type: '', text: '' }); }, 1200);
                        } else {
                            throw new Error('Gateway Offline');
                        }
                    })
                    .catch(() => {
                        setIsCfConnected(false);
                        setCfMessage({ type: 'error', text: 'ไม่สามารถเชื่อมต่อ Worker URL ได้ กรุณาตรวจสอบลิงก์อีกครั้ง' });
                    });
            };

            const fetchFromWorker = async () => {
                if (!workerUrl) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(`${workerUrl.replace(/\/$/, '')}/api/welfare-logs`);
                    const responseData = await res.json();

                    if (!res.ok || !responseData.success) {
                        throw new Error(responseData.error || 'Failed to fetch logs from Worker Gateway');
                    }

                    const data = responseData.data || [];
                    if (data.length > 0) {
                        const formatted = data.map(row => ({
                            Datetime: row.claim_datetime || row.Datetime,
                            Depart: row.depart || row.Depart || "ไม่ระบุ",
                            Level: row.level || row.Level || "-",
                            Barcode: cleanBarcode(row.barcode || row.Barcode),
                            StaffName: row.staff_name || row.StaffName || "N/A",
                            Branch: row.branch || row.Branch || "-",
                            Moviename: row.moviename || row.Moviename || "N/A",
                            No: row.seat_no || row.No || "-",
                            Showtime: row.showtime || row.Showtime || "-",
                            Seat: Number(row.seat_count || row.Seat || 1)
                        }));

                        const cfFileObj = {
                            id: `cf-cloud-${Date.now()}`,
                            fileName: `☁️ Cloudflare Data (${data.length} รายการ)`,
                            uploadTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                            recordCount: formatted.length,
                            enabled: true,
                            data: formatted
                        };

                        setFileList(prev => [cfFileObj, ...prev.filter(f => !f.id.startsWith('cf-cloud-'))]);
                        showNotification(`ดึงข้อมูลสำเร็จ ทั้งหมด ${data.length} รายการ`, 'success');
                    } else {
                        showNotification('ไม่พบข้อมูลในตาราง welfare_logs บนฐานข้อมูล', 'warning');
                    }
                } catch (err) {
                    showNotification('เกิดข้อผิดพลาด: ' + err.message, 'error');
                } finally {
                    setIsSyncing(false);
                }
            };

            const pushToWorker = async () => {
                if (!workerUrl) return;
                if (activeRawData.length === 0) {
                    showNotification('ไม่มีข้อมูลในระบบสำหรับส่งขึ้น Cloud', 'warning');
                    return;
                }

                setIsSyncing(true);
                try {
                    const payload = activeRawData.map(d => ({
                        barcode: cleanBarcode(d.Barcode),
                        staff_name: d.StaffName,
                        depart: d.Depart,
                        level: d.Level,
                        branch: d.Branch,
                        moviename: d.Moviename,
                        seat_no: d.No,
                        seat_count: d.Seat,
                        claim_datetime: parseThaiCustomDate(d.Datetime) ? parseThaiCustomDate(d.Datetime).toISOString() : new Date().toISOString(),
                        showtime: d.Showtime
                    }));

                    const res = await fetch(`${workerUrl.replace(/\/$/, '')}/api/welfare-logs`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const responseData = await res.json();
                    if (!res.ok || !responseData.success) {
                        throw new Error(responseData.error || 'Failed to push logs via Worker Gateway');
                    }

                    showNotification(`บันทึกข้อมูลสำเร็จจำนวน ${payload.length} รายการ`, 'success');
                } catch (err) {
                    showNotification('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + err.message, 'error');
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary', cellDates: true, raw: false });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const rawData = XLSX.utils.sheet_to_json(ws);

                        const formatted = rawData.map(row => ({
                            Datetime: row.Datetime || row.datetime || row.DATETIME || new Date().toISOString(),
                            Depart: row.Depart || row.depart || "ไม่ระบุ",
                            Level: row.Level || row.level || "-",
                            Barcode: cleanBarcode(row.Barcode || row.barcode),
                            StaffName: row.StaffName || row.staffname || row.Name || "N/A",
                            Branch: row.Branch || row.branch || "-",
                            Moviename: row.Moviename || row.moviename || "N/A",
                            No: row.No || row.no || "-",
                            Showtime: row.Showtime || row.showtime || row.SHOWTIME || "-",
                            Seat: Number(row.Seat || row.seat || 1)
                        }));

                        const newFileObj = {
                            id: `file-${Date.now()}`,
                            fileName: file.name,
                            uploadTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                            recordCount: formatted.length,
                            enabled: true,
                            data: formatted
                        };

                        setFileList(prev => [...prev, newFileObj]);
                        setCurrentPage(1);
                        showNotification(`นำเข้าไฟล์ ${file.name} จำนวน ${formatted.length} รายการสำเร็จ!`, 'success');
                    } catch (err) {
                        showNotification('ไม่สามารถอ่านไฟล์ Excel ได้ กรุณาตรวจสอบรูปแบบไฟล์', 'error');
                    } finally {
                        setIsUploading(false);
                        e.target.value = "";
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleFileEnabled = (id) => {
                setFileList(prev => prev.map(f => f.id === id ? { ...f, enabled: !f.enabled } : f));
            };

            const removeFile = (id) => {
                if (fileList.length <= 1) {
                    showNotification('ต้องมีอย่างน้อย 1 ชุดข้อมูลในระบบ', 'warning');
                    return;
                }
                setFileList(prev => prev.filter(f => f.id !== id));
            };

            const toggleBranchSelection = (branchName) => {
                setSelectedBranches(prev => {
                    if (prev.includes(branchName)) {
                        return prev.filter(b => b !== branchName);
                    } else {
                        return [...prev, branchName];
                    }
                });
                setCurrentPage(1);
            };

            const resetAllFilters = () => {
                setSearchTerm("");
                setSelectedDepart("ALL");
                setSelectedBranches([]);
                setSelectedMovie("ALL");
                setSelectedLevel("ALL");
                setTempStartDate("");
                setTempEndDate("");
                setStartDate("");
                setEndDate("");
                setCurrentPage(1);
            };

            const handleApplyDateFilter = () => {
                setStartDate(tempStartDate);
                setEndDate(tempEndDate);
                setCurrentPage(1);
            };

            const handleMonthSelect = (e) => {
                const val = e.target.value;
                if (val) {
                    const [y, m] = val.split('-');
                    const lastDay = new Date(Number(y), Number(m), 0).getDate();
                    setTempStartDate(`${y}-${m}-01`);
                    setTempEndDate(`${y}-${m}-${String(lastDay).padStart(2, '0')}`);
                }
            };

            const activeRawData = useMemo(() => {
                return fileList.filter(f => f.enabled).flatMap(f => f.data);
            }, [fileList]);

            const departmentsList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Depart).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            const branchesList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Branch).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            const moviesList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Moviename).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            const levelsList = useMemo(() => {
                const set = new Set(activeRawData.map(d => d.Level).filter(Boolean));
                return Array.from(set).sort();
            }, [activeRawData]);

            // Filtered records
            const filteredData = useMemo(() => {
                return activeRawData.filter(item => {
                    // Search
                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        const matchName = String(item.StaffName || "").toLowerCase().includes(term);
                        const matchCode = String(item.Barcode || "").toLowerCase().includes(term);
                        const matchMovie = String(item.Moviename || "").toLowerCase().includes(term);
                        if (!matchName && !matchCode && !matchMovie) return false;
                    }
                    // Depart
                    if (selectedDepart !== "ALL" && item.Depart !== selectedDepart) return false;
                    // Branch
                    if (selectedBranches.length > 0 && !selectedBranches.includes(item.Branch)) return false;
                    // Movie
                    if (selectedMovie !== "ALL" && item.Moviename !== selectedMovie) return false;
                    // Level
                    if (selectedLevel !== "ALL" && item.Level !== selectedLevel) return false;
                    // Date
                    const dt = parseThaiCustomDate(item.Datetime);
                    if (startDate && dt) {
                        const s = new Date(startDate);
                        s.setHours(0, 0, 0, 0);
                        if (dt < s) return false;
                    }
                    if (endDate && dt) {
                        const e = new Date(endDate);
                        e.setHours(23, 59, 59, 999);
                        if (dt > e) return false;
                    }
                    return true;
                });
            }, [activeRawData, searchTerm, selectedDepart, selectedBranches, selectedMovie, selectedLevel, startDate, endDate]);

            // Audit Summaries grouped by Employee
            const auditSummary = useMemo(() => {
                const map = {};
                filteredData.forEach(row => {
                    const bc = cleanBarcode(row.Barcode);
                    if (!bc) return;
                    if (!map[bc]) {
                        map[bc] = {
                            barcode: bc,
                            staffName: row.StaffName || "N/A",
                            depart: row.Depart || "N/A",
                            level: row.Level || "-",
                            branch: row.Branch || "-",
                            totalSeatsUsed: 0,
                            claimCount: 0,
                            history: []
                        };
                    }
                    map[bc].totalSeatsUsed += Number(row.Seat || 1);
                    map[bc].claimCount += 1;
                    map[bc].history.push(row);
                });

                return Object.values(map).map(emp => {
                    const rule = levelRules.find(r => r.levelCode.toUpperCase() === String(emp.level).toUpperCase()) || { ticketQty: 0, levelName: "Unknown" };
                    const quota = rule.ticketQty;
                    const remaining = quota - emp.totalSeatsUsed;
                    return {
                        ...emp,
                        quota,
                        remaining: remaining < 0 ? 0 : remaining,
                        isExceeded: emp.totalSeatsUsed > quota,
                        exceededBy: emp.totalSeatsUsed > quota ? emp.totalSeatsUsed - quota : 0
                    };
                });
            }, [filteredData, levelRules]);

            // Dashboard Charts Data
            const chartDepartData = useMemo(() => {
                const map = {};
                filteredData.forEach(d => {
                    const dep = d.Depart || "ไม่ระบุ";
                    map[dep] = (map[dep] || 0) + Number(d.Seat || 1);
                });
                return Object.keys(map).map(k => ({ name: k, seats: map[k] }));
            }, [filteredData]);

            const chartLevelData = useMemo(() => {
                const map = {};
                filteredData.forEach(d => {
                    const lvl = d.Level || "ไม่ระบุ";
                    map[lvl] = (map[lvl] || 0) + Number(d.Seat || 1);
                });
                return Object.keys(map).map(k => ({ name: k, value: map[k] }));
            }, [filteredData]);

            const topMoviesData = useMemo(() => {
                const map = {};
                filteredData.forEach(d => {
                    const m = d.Moviename || "N/A";
                    map[m] = (map[m] || 0) + Number(d.Seat || 1);
                });
                return Object.keys(map).map(k => ({ name: k, count: map[k] })).sort((a, b) => b.count - a.count).slice(0, 5);
            }, [filteredData]);

            // Pagination
            const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
            const paginatedData = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredData.slice(start, start + itemsPerPage);
            }, [filteredData, currentPage, itemsPerPage]);

            return (
                <div className="min-h-screen pb-12 flex flex-col">
                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-2xl border text-xs font-semibold flex items-center gap-2 transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-emerald-950 border-emerald-500/50 text-emerald-200' :
                            toast.type === 'error' ? 'bg-rose-950 border-rose-500/50 text-rose-200' :

                                                <th className="p-3">ชื่อพนักงาน</th>
                                                <th className="p-3">สาขา</th>
                                                <th className="p-3">ชื่อภาพยนตร์</th>
                                                <th className="p-3">เลขที่นั่ง</th>
                                                <th className="p-3 text-center">จำนวนที่นั่ง</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/60">
                                            {paginatedData.length === 0 ? (
                                                <tr>
                                                    <td colSpan="9" className="p-6 text-center text-slate-500">ไม่พบรายการข้อมูลในระบบ</td>
                                                </tr>
                                            ) : (
                                                paginatedData.map((row, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-700/40 transition">
                                                        <td className="p-3 text-slate-400">{formatDateDisplay(row.Datetime)}</td>
                                                        <td className="p-3 font-semibold text-indigo-300">{row.Depart}</td>
                                                        <td className="p-3"><span className="px-1.5 py-0.5 bg-slate-700 text-slate-200 rounded text-[11px]">{row.Level}</span></td>
                                                        <td className="p-3 font-mono text-slate-400">{cleanBarcode(row.Barcode)}</td>
                                                        <td className="p-3 font-semibold text-white">{row.StaffName}</td>
                                                        <td className="p-3 text-slate-300">{row.Branch}</td>
                                                        <td className="p-3 text-emerald-300 font-medium">{row.Moviename}</td>
                                                        <td className="p-3 font-mono">{row.No}</td>
                                                        <td className="p-3 text-center font-bold text-amber-400">{row.Seat}</td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Pagination Controls */}
                                <div className="flex items-center justify-between border-t border-slate-700 pt-3 text-xs">
                                    <span className="text-slate-400">
                                        หน้า {currentPage} จาก {totalPages} ({filteredData.length} รายการ)
                                    </span>
                                    <div className="flex gap-1">
                                        <button 
                                            onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                            disabled={currentPage === 1}
                                            className="px-3 py-1 bg-slate-700 hover:bg-slate-600 disabled:opacity-40 text-white rounded transition"
                                        >
                                            ก่อนหน้า
                                        </button>
                                        <button 
                                            onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                            disabled={currentPage === totalPages}
                                            className="px-3 py-1 bg-slate-700 hover:bg-slate-600 disabled:opacity-40 text-white rounded transition"
                                        >
                                            ถัดไป
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "rules" && (
                            <div className="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-lg space-y-4">
                                <div>
                                    <h3 className="text-base font-bold text-white">⚙️ ตารางเกณฑ์สิทธิ์การรับชมภาพยนตร์ตามระดับตำแหน่ง (Master Level Rules)</h3>
                                    <p className="text-xs text-slate-400">เงื่อนไขโควตาสิทธิ์ต่อเดือนและการจำกัดจำนวนที่นั่งต่อรอบ/เรื่อง</p>
                                </div>

                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left text-xs text-slate-300">
                                        <thead className="bg-slate-900 text-slate-400 uppercase font-semibold border-b border-slate-700">
                                            <tr>
                                                <th className="p-3">รหัสระดับ (Code)</th>
                                                <th className="p-3">ชื่อตำแหน่ง / กลุ่มพนักงาน</th>
                                                <th className="p-3 text-center">โควตาสิทธิ์ต่อเดือน (ตั๋ว)</th>
                                                <th className="p-3 text-center">จำกัดที่นั่ง/เรื่อง</th>
                                                <th className="p-3 text-center">จำกัดที่นั่ง/ครั้ง</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/60">
                                            {levelRules.map((rule) => (
                                                <tr key={rule.levelCode} className="hover:bg-slate-700/40 transition">
                                                    <td className="p-3 font-mono font-bold text-indigo-400">{rule.levelCode}</td>
                                                    <td className="p-3 font-semibold text-white">{rule.levelName}</td>
                                                    <td className="p-3 text-center font-bold text-emerald-400">{rule.ticketQty} ใบ</td>
                                                    <td className="p-3 text-center">{rule.conditionMovie === 0 ? "ไม่จำกัด" : `${rule.conditionMovie} ที่นั่ง`}</td>
                                                    <td className="p-3 text-center">{rule.conditionSeat} ที่นั่ง</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Employee History Modal */}
                    {selectedAuditBarcode && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl max-w-2xl w-full p-6 shadow-2xl relative space-y-4 max-h-[85vh] flex flex-col">
                                <button 
                                    onClick={() => setSelectedAuditBarcode(null)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white p-1"
                                >
                                    ✕
                                </button>
                                <div className="border-b border-slate-800 pb-3">
                                    <h3 className="text-base font-bold text-white">📜 ประวัติการแลกสิทธิ์: {selectedAuditBarcode.staffName}</h3>
                                    <p className="text-xs text-slate-400">Barcode: {selectedAuditBarcode.barcode} • แผนก: {selectedAuditBarcode.depart} • Level: {selectedAuditBarcode.level}</p>
                                </div>

                                <div className="overflow-y-auto custom-scrollbar flex-1 space-y-2">
                                    {selectedAuditBarcode.history.map((h, i) => (
                                        <div key={i} className="p-3 bg-slate-800/80 rounded-xl border border-slate-700/80 flex items-center justify-between text-xs">
                                            <div>
                                                <p className="font-semibold text-emerald-300">{h.Moviename}</p>
                                                <p className="text-[11px] text-slate-400">วันเวลา: {formatDateDisplay(h.Datetime)} • สาขา: {h.Branch}</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="font-bold text-amber-400">{h.Seat} ที่นั่ง</span>
                                                <p className="text-[11px] text-slate-400">ที่นั่ง: {h.No}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
